version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"
      - "github-actions"

updates:
  # Python backend dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"

    ignore:
      # Backend CI currently targets Python 3.11;
      # numpy 2.5+ requires Python 3.12.
      - dependency-name: "numpy"
        versions:
          - ">=2.5.0"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    
