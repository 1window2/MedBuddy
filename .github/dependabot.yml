version: 2
updates:
  - package-ecosystem: "pip" # pip update
    directory: "/backend" # requirements.txt
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    ignore:
      # Backend CI currently targets Python 3.11; numpy 2.5+ requires Python 3.12.
      - dependency-name: "numpy"
        versions:
          - ">=2.5.0"

  # Flutter and Dart package updates
  - package-ecosystem: "pub"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions update settings
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
