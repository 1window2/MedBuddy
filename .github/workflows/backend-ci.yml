name: FastAPI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Source Code Checkout
      uses: actions/checkout@v7

    - name: Set up Python for FastAPI
      uses: actions/setup-python@v7
      with:
        python-version: '3.11' # 추후 v3.12로 migrate할 가능성 있음
        cache: 'pip'
        cache-dependency-path: backend/requirements*.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run FastAPI sanity check
      env: # 환경 변수 추가/삭제 시 변경 요망
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key-for-ci' }}
        PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || 'test-key-for-ci' }}
      run: |
        python -c "import main; print('main import succeeded')"

    - name: Run backend tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key-for-ci' }}
        PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || 'test-key-for-ci' }}
      run: pytest -p no:cacheprovider tests
